# .factory/policies.yaml — Declarative governance policy registry
#
# Each project maintains its own policy list. The adversarial-review skill
# auto-loads this file into the adversary's dispatch rubric. Lint hooks
# read this file to determine which validators to run.
#
# Initialize with: /vsdd-factory:policy-registry init
# Add policies with: /vsdd-factory:policy-add <name>
# Validate with: /vsdd-factory:policy-registry validate
#
# Schema per entry:
#   id: <integer>              # Sequential policy number
#   name: <string>             # snake_case policy flag name
#   description: <string>      # One-line human-readable description
#   adopted: <string>          # Context where adopted (burst, pass, or date)
#   severity: <HIGH|MEDIUM>    # Severity floor for violations
#   enforced_by: [<string>]    # Enforcement mechanisms
#   scope: [<string>]          # Artifact types this policy covers
#   lint_hook: <string|null>   # Path to automated hook (relative to plugin root)
#   verification_steps: [<string>]  # Step-by-step check procedure for the adversary
#                                   # Baseline policies (1-9) have steps baked into agent
#                                   # prompts. Custom policies (10+) MUST include steps
#                                   # here so the adversary knows HOW to verify them.

metadata:
  version: "1.6"
  changelog:
    - version: "1.6"
      date: 2026-05-08
      burst: bundle-A-cleanup-2026-05-08
      findings: [F-AUD-D2-01, F-AUD-D2-11, F-AUD-D3-01, F-AUD-D5-01, F-AUD-D7-01, F-AUD-D8-09]
      change: "Add POL-12 through POL-16 — story status taxonomy reform and BC/VP promotion enforcement. Closes schema and policy layer gaps identified in the 2026-05-08 workspace 8-dimensional audit. Companion ADRs: ADR-020 (story-status-taxonomy-reform) + ADR-021 (bc-vp-promotion-lifecycle)."
    - version: "1.5"
      date: 2026-05-07
      burst: fix-pass-21-pass11-ordering-bookkeeping
      finding: F-PASS11-MED-003
      change: "Generalize POL-11 verification step 1 — remove brittle STORY-INDEX line-71 anchor; step now references the M-34-001 entry by title/content rather than line number, making it portable across BC-INDEX/VP-INDEX/ARCH-INDEX backfills"
    - version: "1.4"
      date: 2026-05-07
      burst: S-3.05-adversary-local-pass5-F-PASS5-LOW-3
      finding: F-PASS5-LOW-3
      change: "POL-1 scope extended: td and pol added to scope tuple [bc, vp, di, cap, story, hs] → [bc, vp, di, cap, story, hs, td, pol]. Aligns literal scope with existing HIGH-severity application (v3.5 TD-069 collision fix). Source: S-3.05 adversary local pass-5."
    - version: "1.3"
      date: 2026-05-07
      burst: fix-pass-20-pass10-process-gap-closures
      finding: F-PASS10-MED-003
      change: "Add POL-11 index_bump_required_for_index_mutations — closes TD-VSDD-070 (backfill-bump policy gap codification)"
    - version: "1.2"
      date: 2026-04-21
      burst: phase-3-wave-0a
      finding: POL-010
      change: "Add POL-010 demo_evidence_story_scoped — per-story subfolder enforcement for demo-recorder output"
    - version: "1.1"
      date: 2026-04-19
      burst: Burst 40
      finding: P3P37-A-OBS-001
      change: "Policy 8 verification_steps: bcs: → behavioral_contracts: (align with actual story frontmatter field name)"
    - version: "1.0"
      date: 2026-04-18
      burst: baseline
      change: "Initial policy registry (9 baseline policies)"

policies:
  - id: 1
    name: append_only_numbering
    description: "All VSDD identifiers are never renumbered or reused. Retired IDs stay in indexes. Filename slugs are immutable."
    adopted: baseline
    severity: HIGH
    enforced_by: [adversary-prompt, consistency-validator]
    scope: [bc, vp, di, cap, story, hs, td, pol]
    lint_hook: null
    verification_steps:
      - "Scan all index files for retired/removed IDs — verify no active artifact reuses a retired ID"
      - "Verify retired entries have replaced_by or removal justification"
      - "Check that filename slugs match original creation (compare git log if available)"

  - id: 2
    name: lift_invariants_to_bcs
    description: "Every domain invariant (DI-NNN) must be cited by at least one BC's Traceability L2 Invariants field. Orphan invariants are drift."
    adopted: baseline
    severity: MEDIUM
    enforced_by: [adversary-prompt, consistency-validator]
    scope: [di, bc]
    lint_hook: null
    verification_steps:
      - "Read domain-spec/invariants.md — extract all DI-NNN IDs"
      - "For each DI-NNN, search BC files for citations in Traceability/L2 Invariants fields"
      - "Report orphan invariants (DI declared but no BC enforces it)"
      - "Verify invariant Scope/enforcer column names BCs that cite it back (bidirectional)"

  - id: 3
    name: state_manager_runs_last
    description: "State-manager agent must be the last to commit in every burst, preventing version-race regressions."
    adopted: baseline
    severity: HIGH
    enforced_by: [orchestrator-rule]
    scope: [story, bc, vp, architecture]
    lint_hook: null
    verification_steps:
      - "Review burst commit history — state-manager commits must come after all other agents"
      - "Check for citation staleness — STORY-INDEX/BC-INDEX versions must match latest story-writer/PO output"

  - id: 4
    name: semantic_anchoring_integrity
    description: "Every anchor claim must be semantically correct, not just syntactically valid. Mis-anchoring always blocks convergence."
    adopted: baseline
    severity: MEDIUM
    enforced_by: [adversary-prompt, consistency-validator]
    scope: [bc, vp, story, architecture]
    lint_hook: null
    verification_steps:
      - "For each BC, verify declared capability actually describes the BC's purpose per capabilities.md"
      - "For each story, verify subsystems: field references subsystems that own the story's scope per ARCH-INDEX"
      - "For each VP, verify anchor_story builds the test vehicle (not an architectural ancestor)"
      - "For traceability table rows, verify descriptions match target artifact's actual title"

  - id: 5
    name: creators_justify_anchors
    description: "Agents creating anchors must justify each choice against the source-of-truth artifact. Stop and ask rather than guess."
    adopted: baseline
    severity: MEDIUM
    enforced_by: [adversary-prompt]
    scope: [bc, vp, story, cap, architecture]
    lint_hook: null
    verification_steps:
      - "Check that BC→CAP anchors include justification citing capabilities.md"
      - "Check that story→subsystem anchors include justification citing ARCH-INDEX"
      - "Check that VP→anchor_story assignments justify why that story builds the test vehicle"
      - "Flag mechanical citations without body substantiation"

  - id: 6
    name: architecture_is_subsystem_name_source_of_truth
    description: "ARCH-INDEX Subsystem Registry is the canonical source for subsystem names. All references must match verbatim."
    adopted: baseline
    severity: HIGH
    enforced_by: [adversary-prompt, consistency-validator]
    scope: [bc, story, prd, architecture]
    lint_hook: null
    verification_steps:
      - "Read ARCH-INDEX Subsystem Registry for canonical subsystem names"
      - "For sampled BCs, verify subsystem: frontmatter matches registry exactly"
      - "For sampled stories, verify subsystems: field uses registry names"
      - "Check BC-INDEX subsystem column matches ARCH-INDEX"

  - id: 7
    name: bc_h1_is_title_source_of_truth
    description: "BC file H1 heading is the authoritative BC title. All downstream references must match. Enrichment goes INTO the H1."
    adopted: baseline
    severity: HIGH
    enforced_by: [adversary-prompt, consistency-validator]
    scope: [bc, story, prd]
    lint_hook: null
    verification_steps:
      - "Sample 10+ BCs — read H1 heading and compare to BC-INDEX title column"
      - "Check for downstream-only enrichment not present in H1"
      - "Verify H1 accurately describes what the BC's postconditions specify"

  - id: 8
    name: bc_array_changes_propagate_to_body_and_acs
    description: "When a story behavioral_contracts: frontmatter changes, the same commit must update body BC table, ACs, and Token Budget count."
    adopted: baseline
    severity: HIGH
    enforced_by: [adversary-prompt, consistency-validator]
    scope: [story, bc]
    lint_hook: null
    verification_steps:
      - "Sample 5+ stories — for each BC in behavioral_contracts: frontmatter, verify it appears in body BC table"
      - "For each BC in behavioral_contracts: frontmatter, verify at least one AC traces to it"
      - "For each BC in body BC table or AC traces, verify it appears in behavioral_contracts: frontmatter"
      - "Verify Token Budget BC count matches len(behavioral_contracts)"

  - id: 9
    name: vp_index_is_vp_catalog_source_of_truth
    description: "VP-INDEX.md is authoritative. Changes must propagate same-burst to verification-architecture.md and verification-coverage-matrix.md."
    adopted: baseline
    severity: HIGH
    enforced_by: [adversary-prompt, lint-hook, consistency-validator]
    scope: [vp, architecture]
    lint_hook: hooks/validate-vp-consistency.sh
    verification_steps:
      - "Verify VP-INDEX arithmetic: total = sum of per-tool counts = row count"
      - "For each VP in VP-INDEX, verify it appears in verification-architecture.md Provable Properties Catalog"
      - "For each VP in VP-INDEX, verify it appears in verification-coverage-matrix.md VP-to-Module table"
      - "Sum coverage matrix per-tool columns — must equal VP-INDEX per-tool totals"
      - "Reverse check: every VP in arch docs must exist in VP-INDEX"

  - id: 10
    name: demo_evidence_story_scoped
    description: "All demo-recorder output MUST live under docs/demo-evidence/<STORY-ID>/. Flat docs/demo-evidence/*.md files collide across stories (evidence-report.md in particular)."
    adopted: phase-3-wave-0a-2026-04-21
    severity: HIGH
    enforced_by: [adversary-prompt, consistency-validator, pr-reviewer]
    scope: [story, demo-evidence, pr]
    lint_hook: null
    verification_steps:
      - "For each story's feature branch, verify docs/demo-evidence/<STORY-ID>/ exists as a subfolder"
      - "Verify NO files exist directly at docs/demo-evidence/*.md — only subfolders"
      - "Verify evidence-report.md lives at docs/demo-evidence/<STORY-ID>/evidence-report.md"
      - "Cross-check: story ID in frontmatter matches subfolder name"
      - "During wave integration gate, list docs/demo-evidence/ and confirm every subdir matches a known story ID"

  - id: 11
    name: index_bump_required_for_index_mutations
    description: |
      Any burst that mutates an index file (frontmatter version, prose changelog,
      tabular changelog, or row-tag content) MUST bump the index version, regardless
      of whether the change is content-creating or audit-trail-restoring. Backfill
      bursts that "fill missing prose entries" are still mutations and DO bump.
    adopted: fix-pass-20-pass10-process-gap-closures-2026-05-07
    severity: HIGH
    enforced_by: [adversary-prompt, consistency-validator, state-manager]
    scope:
      - story-index
      - bc-index
      - vp-index
      - arch-index
    lint_hook: null
    verification_steps:
      - "Read the M-34-001 precedent (find the STORY-INDEX changelog entry titled 'M-34-001 fix burst' covering the v1.64→v1.65 prose backfill bump): prose-only backfill bumped the index version even though no spec content changed. The same precedent applies to BC-INDEX, VP-INDEX, and ARCH-INDEX."
      - "Verify any commit touching an INDEX file body bumps the frontmatter version field by >= 1 minor revision."
      - "Verify the new version has a corresponding prose entry AND tabular row."
      - "Verify all live pins (frontmatter, narrative, SESSION-HANDOFF) propagate the new version atomically."
    citations:
      - "TD-VSDD-070 (backfill-bump policy gap) — closed by this policy"
      - "M-34-001 (2026-04-28) original precedent"
      - "F-PASS9-CRIT-001 / fix-pass-19 (2026-05-07) precedent restoration"

  - id: 12
    name: production_stub_residue_blocks_merge
    description: "Stories with `status: merged` MUST NOT have any `todo!()`, `unimplemented!()`, or panic-with-stub-literal in production paths reachable from any pub fn. Stub residue requires `status: partial-merge` plus per-site TD annotation."
    adopted: bundle-A-cleanup-2026-05-08
    severity: HIGH
    enforced_by: [adversary-prompt, pre-merge-hook, code-reviewer]
    scope: [story, source-code]
    lint_hook: hooks/check-stub-residue.sh
    references_adr: ADR-020
    verification_steps:
      - "Run `rg --type rust 'todo!\\(|unimplemented!\\(' crates/*/src/ --glob '!**/tests/**' --glob '!**/proofs/**'` — any match in a story's delivery files while that story has `status: merged` is a violation."
      - "Run `rg --type rust 'panic!\\([^)]*\"[^\"]*(?:TODO|todo|not yet|stub|unimplemented)' crates/*/src/ --glob '!**/tests/**'` to catch panic!-with-stub-literal variants."
      - "For each hit, verify it does NOT live inside a `#[cfg(test)]` block or `mod tests {` scope — those are permitted. Only hits in non-test production code are violations."
      - "Cross-check hit against the owning story's frontmatter `status:` field. If `status: merged` → block. If `status: partial-merge` → verify each stub site has a TD annotation comment (e.g., `// TODO(TD-XXX):`); missing annotation is also a violation."
      - "Check for `// Stub module:` or `// STUB` doc-comment lines in the same files — these may indicate the function is a stub even if the body does not contain the exact pattern (record as advisory finding)."
      - "Confirm the escape valve: if a site exists in an allowlist at `.factory/stub-residue-allowlist.yaml` with a TD reference and human approval note, the finding is suppressed for that specific site only."

  - id: 13
    name: story_frontmatter_index_consistency
    description: "STORY-INDEX status column MUST agree with each story file's frontmatter `status:` field. STORY-INDEX is derivative — story files are source of truth."
    adopted: bundle-A-cleanup-2026-05-08
    severity: HIGH
    enforced_by: [adversary-prompt, pre-burst-hook, state-manager]
    scope: [story, story-index]
    lint_hook: hooks/check-story-index-consistency.sh
    references_adr: ADR-020
    verification_steps:
      - "For each `.factory/stories/*.md` (excluding STORY-INDEX.md itself), extract the `status:` value from the YAML frontmatter block (between the `---` delimiters)."
      - "Parse STORY-INDEX.md to locate the row for each story by story ID. The status annotation appears as the second column of the Full Story List table or as `[MERGED ...]` / `[PARTIAL-MERGE ...]` / `[READY ...]` inline text, OR as a bare status token."
      - "Compare each story's frontmatter `status:` against its STORY-INDEX representation. Exact-string match is required (e.g., `partial-merge` in frontmatter must correspond to a PARTIAL-MERGE annotation in STORY-INDEX, not MERGED)."
      - "Report every mismatch as a violation with the story ID, frontmatter value, and STORY-INDEX value. If STORY-INDEX has no row for a story file → also a violation (unregistered story)."
      - "Verify that no story carries an unrecognized `status:` value. Valid set: {draft, ready, in-progress, partial-merge, merged, retired}. Any other value (including `delivered`) is a violation per ADR-020."

  - id: 14
    name: bc_vp_promotion_on_anchor_merge
    description: "When a story flips to `status: merged` (not `partial-merge`), the BCs in its `behavioral_contracts:` array MUST auto-promote `draft → active`. State-manager performs this bump atomically with the status flip."
    adopted: bundle-A-cleanup-2026-05-08
    severity: HIGH
    enforced_by: [state-manager, post-merge-audit]
    scope: [bc, vp, story]
    lint_hook: hooks/check-bc-promotion.sh
    references_adr: ADR-021
    verification_steps:
      - "Enumerate all stories with `status: merged` in their frontmatter. For each, extract the `behavioral_contracts:` frontmatter array."
      - "For each BC ID in those arrays, read the corresponding BC file's frontmatter `status:` field. If it is `draft`, this is a missed-promotion violation (the story merged but the BC was never bumped to `active`)."
      - "Verify that stories with `status: partial-merge` do NOT have their BCs promoted to `active`. If any BC in a `partial-merge` story's `behavioral_contracts:` array is `active`, verify that ANOTHER fully-merged story also owns that BC (dual-ownership is legitimate)."
      - "Check BC-INDEX for every BC listed as `active` — confirm at least one anchor story with `status: merged` (not `partial-merge`) cites it in `behavioral_contracts:`."
      - "Spot-check the promotion timestamps: if a BC flipped to `active` on date X, there should be a story with `status: merged` (flip date <= X) citing that BC in `behavioral_contracts:`."

  - id: 15
    name: runtime_wiring_required_for_accepted_adrs
    description: "Every ADR with `status: accepted` and crate-level deliverables MUST be reachable from at least one production binary (`bin/` target). Architectural decisions cannot be considered implemented if no binary instantiates the code."
    adopted: bundle-A-cleanup-2026-05-08
    severity: MEDIUM
    enforced_by: [scheduled-audit, wave-gate-hook]
    scope: [adr, architecture, runtime]
    lint_hook: skills/audit-runtime-wiring/
    references_adr: ADR-021
    verification_steps:
      - "Read ARCH-INDEX.md ADR Registry. Extract all ADRs with `status: ACCEPTED`. For each, determine whether it declares a crate-level deliverable (i.e., introduces or materially changes a crate's public API or binary entry point)."
      - "Run `cargo metadata --format-version 1 --no-deps | jq '.packages[].targets[] | select(.kind[] == \"bin\") | .src_path'` to enumerate all `[[bin]]` entry points in the workspace."
      - "For each accepted ADR with a deliverable (e.g., ADR-005 → rmcp/MCP server, ADR-016 → ActionDeliveryEngine, ADR-019 → WASM plugin runtime): search each binary entry point's reachability for at least one call to the ADR's primary type/function. Use `rg '<EntryType>::new\\|<EntryFn>\\b' src/main.rs` (or the equivalent path)."
      - "Flag any accepted ADR whose primary deliverable type cannot be found in any binary's call graph. Record as ADR-ID / deliverable-type / reason (e.g., `AD-005 / MCP Server / prism-mcp crate is a 10-line stub`)."
      - "False-positive escape: if the ADR has an explicit `wiring_deferred_to:` field in its frontmatter referencing a future story, suppress the finding but log it as a tracked deferral."

  - id: 16
    name: no_inverted_polarity_tests_outside_red_gate
    description: "Tests that assert production code panics with stub-indicating messages (e.g., `#[should_panic(expected = \"not yet implemented\")]`) are forbidden in stories with `status: merged` or `status: partial-merge`. Such tests are only permitted transiently during the Red Gate stub-architect phase, and must be retired by the implementer before status flip."
    adopted: bundle-A-cleanup-2026-05-08
    severity: HIGH
    enforced_by: [adversary-prompt, pre-merge-hook, test-writer-rule]
    scope: [story, source-code, test]
    lint_hook: hooks/check-inverted-polarity.sh
    references_adr: ADR-020
    verification_steps:
      - "Run `rg --type rust '#\\[should_panic\\([^)]*expected\\s*=\\s*\"[^\"]*(?:not yet implemented|not implemented|TODO|stub|unimplemented)' tests/ crates/*/src/ crates/*/tests/'` to find all inverted-polarity test decorators in the workspace."
      - "For each hit, identify the owning story by matching the crate to story `crate:` fields or the `behavioral_contracts:` that include the BC under test. Check that story's frontmatter `status:` field."
      - "If the owning story has `status: merged` or `status: partial-merge` → violation. The test codifies a stub as the production contract; it would break the day the stub is implemented."
      - "If the owning story has `status: in-progress` or `status: ready` → permitted as a transient Red Gate test (stub-architect phase). Record but do not block."
      - "Verify there is no story with `status: merged` where a `#[should_panic(expected = ...)]` test has a stub-indicating message AND the production function signature matches the BC's SUT. This is the specific failure case from F-AUD-D3-01."
      - "False-positive escape: tests that `#[should_panic]` on an INTENTIONAL panic (e.g., type-system invariant violation, not stub residue) may carry a suppress annotation `// POL-16-OK: intentional-panic` on the line above the attribute. Verify the justification is plausible."
