# CI Pipeline — PR gate: fmt -> clippy -> test -> deny -> audit -> semver-checks (AD-008 order)
name: CI

on:
  push:
  pull_request:

# Optimization 4: concurrency control — cancel superseded runs on PR pushes,
# but NOT on push-to-develop (which gates the post-merge workflow).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: Clippy (AD-008)
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - name: Install protoc (required by prost-build for prism-ocsf)
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # Optimization 1: Swatinem/rust-cache for incremental build caching
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          shared-key: clippy-stable
      - name: Run clippy
        run: cargo clippy --workspace --all-features -- -D warnings

  test:
    name: Test (${{ matrix.target }})
    needs: clippy
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            proptest_cases: 256
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            proptest_cases: 256
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            proptest_cases: 1000
            run_doctests: true
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            install_musl: true
            proptest_cases: 256
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            proptest_cases: 256
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - name: Install protoc (required by prost-build for prism-ocsf)
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # Optimization 1: Swatinem/rust-cache — per-target shared key for cache isolation
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          shared-key: test-${{ matrix.target }}
      - name: Install musl-tools
        if: matrix.install_musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      # Optimization: mold linker — faster linking on Linux (saves ~5 min per Linux leg)
      # make-default: false — we set RUSTFLAGS explicitly for robustness (see rui314/setup-mold#3)
      - name: Install mold linker (Linux only)
        if: runner.os == 'Linux'
        uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
        with:
          make-default: false
      # Optimization: taiki-e/install-action for prebuilt cargo-nextest (saves ~3 min vs cargo install)
      - name: Install nextest
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2.75.22
        with:
          tool: nextest
      # PROPTEST_CASES tier model: linux-gnu=1000 (full strength), others=256 (proptest default).
      # RUSTFLAGS: mold linker on Linux only; empty on macOS/Windows (no mold equivalent).
      # NOTE: If a future story adds RUSTFLAGS, merge with a space separator — do not replace.
      - name: Run tests (nextest)
        env:
          PROPTEST_CASES: ${{ matrix.proptest_cases }}
          RUSTFLAGS: ${{ runner.os == 'Linux' && '-C link-arg=-fuse-ld=mold' || '' }}
        run: cargo nextest run --workspace --all-features --profile ci
      - name: Run doctests (linux-gnu only — nextest skips doctests)
        if: matrix.run_doctests
        run: cargo test --workspace --all-features --doc
      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: junit-${{ matrix.target }}
          path: target/nextest/ci/junit.xml
          retention-days: 7

  test-no-default-features:
    # P3WV1B-A-M-004: exercise compile-time feature-negative paths.
    # prism-dtu-demo-server is excluded because its public API is gated behind
    # the `dtu` feature by design (required-features in [[bin]] + [[test]]).
    name: Test (no-default-features)
    needs: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install protoc (required by prost-build for prism-ocsf)
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # Optimization 1: Swatinem/rust-cache
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          shared-key: test-no-default-features
      # Optimization: mold linker — faster linking on Linux
      - name: Install mold linker
        uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
        with:
          make-default: false
      # Optimization: taiki-e/install-action for prebuilt cargo-nextest
      - name: Install nextest
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2.75.22
        with:
          tool: nextest
      - name: Run tests (no default features)
        env:
          PROPTEST_CASES: 1000
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: cargo nextest run --workspace --no-default-features --exclude prism-dtu-demo-server --profile ci

  deny:
    name: Cargo deny (license + advisory)
    # Optimization 2: parallel with test — was: needs: test (chained through slowest job).
    # deny only reads Cargo metadata; it does not compile workspace crates.
    needs: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Optimization 5: removed arduino/setup-protoc — deny reads Cargo metadata only,
      # it does not invoke prost-build.
      - uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb # v2.0.17
        with:
          command: check
          arguments: --all-features

  audit:
    name: Cargo audit (RustSec)
    # Optimization 2: parallel with test — was: needs: deny (chained after deny).
    # audit reads Cargo.lock metadata only; it does not compile workspace crates.
    needs: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Optimization 5: removed arduino/setup-protoc — audit reads Cargo.lock only.
      # Optimization 3: taiki-e/install-action for prebuilt cargo-audit (saves ~3min vs cargo install)
      - uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2.75.22
        with:
          tool: cargo-audit
      - name: Run cargo audit
        run: cargo audit

  semver-checks:
    name: Semver compatibility
    # Optimization 2: parallel with test — was: needs: audit (chained after audit).
    needs: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install protoc (required by prost-build for prism-ocsf)
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # Optimization 1: Swatinem/rust-cache
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          shared-key: semver
      # Optimization 3: taiki-e/install-action for prebuilt cargo-semver-checks (saves ~5min vs cargo install)
      - uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2.75.22
        with:
          tool: cargo-semver-checks
      - name: Run semver checks
        # Use git baseline to avoid crates.io lookup (workspace crates are unpublished).
        # cargo-semver-checks errors on new crates not present in the baseline revision.
        # We check only crates that exist in origin/develop; new crates are excluded.
        run: |
          BASELINE_MEMBERS=$(git show origin/develop:Cargo.toml | grep -oP '(?<="crates/)[\w-]+(?=")' || true)
          EXCLUDE_ARGS=""
          for crate in $(cargo metadata --no-deps --format-version 1 | \
              jq -r '.packages[].name'); do
            if ! echo "$BASELINE_MEMBERS" | grep -qF "$crate"; then
              EXCLUDE_ARGS="$EXCLUDE_ARGS --exclude $crate"
            fi
          done
          if [ -z "$EXCLUDE_ARGS" ]; then
            cargo semver-checks check-release --baseline-rev origin/develop
          else
            echo "Excluding new crates from semver check: $EXCLUDE_ARGS"
            cargo semver-checks check-release --baseline-rev origin/develop $EXCLUDE_ARGS
          fi

  fuzz-smoke-vp021:
    name: Fuzz smoke (vp021_parse_fuzz)
    # VP-021: PrismQlParser never panics on arbitrary byte input.
    # 60s smoke run on every PR/push — catches regressions fast.
    # Full 30-min run lives in fuzz-nightly.yml (scheduled).
    needs: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          shared-key: fuzz-smoke-${{ runner.os }}
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2.75.22
        with:
          tool: cargo-fuzz
      - name: Add gnu target (sanitizer requires glibc, not musl)
        run: rustup target add x86_64-unknown-linux-gnu
      - name: Fuzz smoke (VP-021, 60s)
        run: |
          set -euo pipefail
          cd fuzz && cargo +nightly fuzz run vp021_parse_fuzz --target x86_64-unknown-linux-gnu -- -max_total_time=60 -max_len=65536

  perimeter-compile-fail:
    name: Perimeter compile-fail check (BC-2.11.006 v1.8)
    # BC-2.11.006 v1.8 postcondition: sub-parsers (parse_filter, parse_sql,
    # parse_pipe, build_pipe_parser, and all builder factories + ParseLimits
    # methods) are pub(crate) and MUST NOT be reachable from external crates.
    # This job compiles a deliberate violator and asserts that `cargo check`
    # fails with a Rust visibility error (E0603/E0624) for EACH named symbol.
    #
    # Pass-7 F-HIGH-001: binary signal replaced with per-symbol assertion.
    # A single-symbol regression (one symbol promoted to pub while siblings
    # remain pub(crate)) is now detectable — siblings still produce E0603 but
    # the regressed symbol's absence from the error list triggers a failure.
    #
    # Adversary pass-5 OBS-003 [process-gap] remediation.
    # Adversary pass-7 F-HIGH-001/OBS-001 remediation.
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Checkout feature branch (source code)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Checkout factory-artifacts branch (spec frontmatter)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: factory-artifacts
          path: .factory-spec
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install protoc (required by prost-build for prism-ocsf transitive dep)
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          shared-key: perimeter-compile-fail
      - name: Assert perimeter-violation fails to compile with per-symbol E0603 checks
        run: |
          set -uo pipefail
          # Capture stderr+stdout separately from the exit code.
          # We must NOT use `cmd | tee` because that evaluates tee's exit code,
          # not cargo's. Instead, redirect to a log file directly.
          cargo check \
            --manifest-path tests/external/perimeter-violation/Cargo.toml \
            > /tmp/perimeter-check.log 2>&1 \
            && CARGO_RC=0 || CARGO_RC=$?
          cat /tmp/perimeter-check.log
          if [ "${CARGO_RC}" -eq 0 ]; then
            echo "::error::Perimeter compile-fail check FAILED — sub-parser is publicly accessible (security regression, BC-2.11.006 v1.8)"
            echo "::error::All restricted symbols became pub. Revert the visibility changes."
            exit 1
          fi
          # Per-symbol assertion: parse cargo output and verify each restricted_symbol
          # from BC-2.11.006 frontmatter appears in the E0603/E0624 error list.
          # A single-symbol regression (one symbol promoted to pub while siblings
          # remain private) will still produce a non-zero cargo exit but will be
          # MISSING from the error list — this script catches that case.
          python3 - << 'PYEOF'
          import re, sys

          SPEC_PATH = ".factory-spec/specs/behavioral-contracts/BC-2.11.006-query-security-limits.md"
          LOG_PATH  = "/tmp/perimeter-check.log"

          # --- Normalize spec symbols (same logic as perimeter-symbols-sync) ---
          def normalize_to_use_path(sym):
              parts = sym.split('::')
              trim_to = len(parts)
              for i in range(len(parts) - 1, 0, -1):
                  if parts[i][0].isupper():
                      break
                  if parts[i - 1][0].isupper():
                      trim_to = i
                  else:
                      break
              return '::'.join(parts[:trim_to])

          # --- Load restricted symbols from BC frontmatter ---
          with open(SPEC_PATH) as f:
              spec_content = f.read()

          fm_match = re.match(r'^---\n(.*?)\n---', spec_content, re.DOTALL)
          if not fm_match:
              print(f"ERROR: No YAML frontmatter found in {SPEC_PATH}", file=sys.stderr)
              sys.exit(1)
          fm_text = fm_match.group(1)

          symbols_match = re.search(
              r'restricted_symbols:\s*\n(?:.*\n)*?  symbols:\s*\n((?:    - .+\n?)*)',
              fm_text
          )
          if not symbols_match:
              print("ERROR: restricted_symbols.symbols block not found in BC-2.11.006 frontmatter.", file=sys.stderr)
              sys.exit(1)

          raw_spec_symbols = [
              line.strip().lstrip('- ')
              for line in symbols_match.group(1).splitlines()
              if line.strip().startswith('- ')
          ]

          # Build unique leaf names for each restricted symbol.
          # For free functions: last path segment (e.g., parse_filter).
          # For struct methods: last path segment of the full symbol (e.g., install_thread_local).
          # For struct paths (after normalization collapse): last segment of the struct (e.g., ParseLimits).
          # We check against BOTH the raw leaf (method name) and the struct name,
          # because the cargo error may report either E0603 on the struct or E0624 on the method.
          expected_leaf_names = set()
          for sym in raw_spec_symbols:
              parts = sym.split('::')
              # Add the leaf symbol name (method or function)
              expected_leaf_names.add(parts[-1])
              # If the parent segment is PascalCase (struct method), also add the struct name
              if len(parts) >= 2 and parts[-2][0].isupper():
                  expected_leaf_names.add(parts[-2])

          print(f"BC-2.11.006 restricted_symbols ({len(raw_spec_symbols)} entries):")
          for s in raw_spec_symbols:
              print(f"  {s}")
          print(f"\nExpected error leaf names ({len(expected_leaf_names)}):")
          for n in sorted(expected_leaf_names):
              print(f"  {n}")

          # --- Parse cargo output for E0603/E0624 errors ---
          with open(LOG_PATH) as f:
              log_content = f.read()

          # Match patterns like:
          #   error[E0603]: function `parse_filter` is private
          #   error[E0624]: method `install_thread_local` is private
          #   error[E0603]: struct `ParseLimits` is private
          # Parse line-by-line to avoid multiline regex hazards from cargo's
          # multi-line note sections that contain backtick-quoted symbol names.
          found_names = set()
          for line in log_content.splitlines():
              m = re.match(r'error\[(?:E0603|E0624)\]:[^`]*`([^`]+)`.*(?:private|restricted)', line)
              if m:
                  found_names.add(m.group(1))

          print(f"\nE0603/E0624 error symbols found in cargo output ({len(found_names)}):")
          for n in sorted(found_names):
              print(f"  {n}")

          # --- Per-symbol assertion ---
          # For each raw restricted symbol, check that its leaf name (or struct name
          # for method entries) appears in the error output.
          failures = []
          for sym in raw_spec_symbols:
              parts = sym.split('::')
              leaf = parts[-1]
              # For struct methods: the error may appear as the struct (E0603 on import)
              # or as the method (E0624 on call). Accept either.
              is_method = len(parts) >= 2 and parts[-2][0].isupper()
              struct_name = parts[-2] if is_method else None

              if leaf in found_names:
                  print(f"  PASS  {sym}  (leaf: {leaf})")
              elif struct_name and struct_name in found_names:
                  print(f"  PASS  {sym}  (via struct: {struct_name})")
              else:
                  failures.append(sym)
                  print(f"  FAIL  {sym}  (leaf '{leaf}' not in E0603/E0624 errors)")

          print()
          if failures:
              for sym in failures:
                  leaf = sym.split('::')[-1]
                  print(
                      f"::error::Symbol {sym} (leaf: {leaf}) did not produce an E0603/E0624 error "
                      f"— it may have regressed to pub. Promotion to pub or removal from "
                      f"BC restricted_symbols required.",
                      file=sys.stderr
                  )
              print(
                  f"\nPerimeter check FAILED: {len(failures)} of {len(raw_spec_symbols)} restricted symbols "
                  f"did not appear in cargo error output.",
                  file=sys.stderr
              )
              sys.exit(1)

          print(
              f"Perimeter check passed: all {len(raw_spec_symbols)} restricted symbols "
              f"produced E0603/E0624 errors (cargo check correctly failed)."
          )
          sys.exit(0)
          PYEOF

  perimeter-symbols-sync:
    name: Perimeter symbols sync check (BC-2.11.006 OBS-001)
    # Adversary pass-6 OBS-001 [process-gap] remediation.
    #
    # BC-2.11.006 v1.8 frontmatter lists `restricted_symbols.symbols:` — the
    # canonical set of crate-private symbols that external crates MUST NOT
    # reach. The perimeter-violation test in
    # tests/external/perimeter-violation/src/main.rs must contain a matching
    # `use prism_query::…` import for every importable unit in the spec.
    #
    # Normalization rule: Rust `use` can only address free functions, modules,
    # and types — not struct methods. Spec entries of the form
    # `prism_query::A::B::MethodName` (where B is a PascalCase type) are
    # normalized to the parent struct path `prism_query::A::B` for comparison,
    # because that is the `use` statement the test file must contain.  Multiple
    # method entries on the same struct collapse to a single required import.
    #
    # Any divergence (spec importable-unit missing from test, or test import not
    # covered by any spec entry) fails the PR with an explanatory diff.
    #
    # .factory/ is on the `factory-artifacts` orphan branch (not committed to
    # feature branches). We fetch it via a second actions/checkout into
    # .factory-spec/ so the CI runner can read the spec frontmatter without
    # polluting the workspace.
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - name: Checkout feature branch (source code)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Checkout factory-artifacts branch (spec frontmatter)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: factory-artifacts
          path: .factory-spec
      - name: Assert spec restricted_symbols match perimeter-violation imports
        run: |
          set -euo pipefail
          python3 - << 'PYEOF'
          import re, sys

          SPEC_PATH = ".factory-spec/specs/behavioral-contracts/BC-2.11.006-query-security-limits.md"
          TEST_PATH = "tests/external/perimeter-violation/src/main.rs"

          # --- Extract spec symbols from YAML frontmatter ---
          with open(SPEC_PATH) as f:
              spec_content = f.read()

          fm_match = re.match(r'^---\n(.*?)\n---', spec_content, re.DOTALL)
          if not fm_match:
              print(f"ERROR: No YAML frontmatter found in {SPEC_PATH}", file=sys.stderr)
              sys.exit(1)
          fm_text = fm_match.group(1)

          # Parse restricted_symbols.symbols list.
          # Expected frontmatter shape:
          #   restricted_symbols:
          #     description: "..."
          #     symbols:
          #       - prism_query::...
          symbols_match = re.search(
              r'restricted_symbols:\s*\n(?:.*\n)*?  symbols:\s*\n((?:    - .+\n?)*)',
              fm_text
          )
          if not symbols_match:
              print(
                  f"ERROR: restricted_symbols.symbols block not found in {SPEC_PATH} frontmatter.\n"
                  "BC-2.11.006 must be at v1.8+ with a structured restricted_symbols: block.",
                  file=sys.stderr
              )
              sys.exit(1)

          raw_spec_symbols = [
              line.strip().lstrip('- ')
              for line in symbols_match.group(1).splitlines()
              if line.strip().startswith('- ')
          ]

          # Normalize spec symbols to importable Rust `use` paths.
          #
          # Rule: a path segment is a struct/enum name if it starts with an
          # uppercase letter (PascalCase).  Method names that follow a PascalCase
          # segment cannot be addressed by `use`; they are accessed by calling
          # the method on an imported struct instance.  Strip trailing method
          # segments so that each spec entry maps to a `use`-addressable path.
          #
          # Example:
          #   prism_query::security::ParseLimits::install_thread_local
          #   → prism_query::security::ParseLimits        (strip snake_case tail)
          #
          #   prism_query::filter_parser::parse_filter
          #   → prism_query::filter_parser::parse_filter  (no PascalCase parent; keep)
          def normalize_to_use_path(sym):
              parts = sym.split('::')
              # Walk from the end; trim trailing snake_case segments that follow
              # a PascalCase segment (those are method names, not importable items).
              trim_to = len(parts)
              for i in range(len(parts) - 1, 0, -1):
                  if parts[i][0].isupper():
                      # This segment is PascalCase — it IS importable; stop trimming.
                      break
                  if parts[i - 1][0].isupper():
                      # Previous segment is PascalCase; current is a method — trim.
                      trim_to = i
                  else:
                      # All-lowercase chain with no PascalCase parent above; keep.
                      break
              return '::'.join(parts[:trim_to])

          # Build the set of `use`-importable paths required by the spec.
          # Multiple method entries on the same struct collapse to one path.
          spec_use_paths = sorted(set(normalize_to_use_path(s) for s in raw_spec_symbols))

          # --- Extract `use prism_query::` lines from perimeter-violation ---
          with open(TEST_PATH) as f:
              test_content = f.read()

          test_symbols = sorted(
              re.sub(r'^use (.+);$', r'\1', line.strip())
              for line in test_content.splitlines()
              if re.match(r'^use prism_query::', line.strip())
          )

          # --- Compare normalized spec paths vs test use statements ---
          spec_set = set(spec_use_paths)
          test_set = set(test_symbols)
          only_in_spec = sorted(spec_set - test_set)
          only_in_test = sorted(test_set - spec_set)

          print(f"Spec restricted_symbols  ({len(raw_spec_symbols)} entries, {len(spec_use_paths)} importable paths):")
          for s in spec_use_paths:
              print(f"  {s}")
          print(f"\nTest use statements ({len(test_symbols)}):")
          for s in test_symbols:
              print(f"  {s}")
          print()

          if not only_in_spec and not only_in_test:
              print(f"OK: all {len(spec_use_paths)} required imports are present in the perimeter-violation test.")
              sys.exit(0)

          print("FAIL: BC-2.11.006 restricted_symbols diverges from perimeter-violation imports.", file=sys.stderr)
          print("", file=sys.stderr)
          if only_in_spec:
              print("Importable paths required by spec but MISSING from perimeter-violation/src/main.rs:", file=sys.stderr)
              for s in only_in_spec:
                  print(f"  {s}", file=sys.stderr)
              print("  → Add a `use <path>;` import to perimeter-violation/src/main.rs for each.", file=sys.stderr)
              print("", file=sys.stderr)
          if only_in_test:
              print("Imports in perimeter-violation/src/main.rs NOT covered by any BC-2.11.006 restricted_symbols entry:", file=sys.stderr)
              for s in only_in_test:
                  print(f"  {s}", file=sys.stderr)
              print("  → Either add the symbol (or a method on it) to restricted_symbols.symbols:", file=sys.stderr)
              print("    in BC-2.11.006 frontmatter, or remove the `use` line if not restricted.", file=sys.stderr)
              print("", file=sys.stderr)
          print(f"Spec importable paths: {len(spec_use_paths)}, Test imports: {len(test_symbols)}", file=sys.stderr)
          sys.exit(1)
          PYEOF

  verify-workflow-structure:
    name: Verify workflow structure (AC-5..AC-8 reachability)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate workflow YAML + reachability assertions
        run: |
          # Structural validation
          for wf in .github/workflows/*.yml; do
            echo "Validating $wf..."
            # Basic YAML parse
            python3 -c "import yaml; yaml.safe_load(open('$wf'))"
          done
          # AC-5..AC-8 reachability assertions (replace YAML-grep-only evidence)
          # AC-5: multi-platform matrix in ci.yml (include-style matrix with 5 targets)
          # Match only 12-space-indented matrix object keys; excludes this assertion line.
          TARGET_COUNT=$(grep -cE '^            target:' .github/workflows/ci.yml || true)
          [ "$TARGET_COUNT" -ge 5 ] || { echo "AC-5 FAIL: expected >=5 target entries, got $TARGET_COUNT"; exit 1; }
          # AC-6: cargo-deny + cargo-audit jobs exist
          grep -qE '(cargo.?deny|cargo.?audit)' .github/workflows/ci.yml || { echo 'AC-6 FAIL'; exit 1; }
          # AC-7: semver check job exists
          grep -qE 'semver' .github/workflows/ci.yml || { echo 'AC-7 FAIL'; exit 1; }
          # AC-8: no-default-features job exists (added in Pass 2 remediation)
          grep -qE 'no-default-features' .github/workflows/ci.yml || { echo 'AC-8 FAIL'; exit 1; }
          echo 'All AC-5..AC-8 reachability assertions pass.'
