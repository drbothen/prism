# Release workflow — triggered by v* tags; 5-platform builds, GitHub Release, Homebrew tap, crates.io
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build release (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write      # required for OIDC attestation
      attestations: write  # required for attest-build-provenance
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
    outputs:
      binary_exists: ${{ steps.check_binary.outputs.binary_exists }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check for binary crate
        id: check_binary
        run: |
          if [[ -d "crates/prism-bin" ]]; then
            echo "binary_exists=true" >> $GITHUB_OUTPUT
          else
            echo "binary_exists=false" >> $GITHUB_OUTPUT
            echo "::warning::No binary crate (crates/prism-bin) yet; release build steps will skip."
          fi
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: steps.check_binary.outputs.binary_exists == 'true'
        with:
          targets: ${{ matrix.target }}
      # Optimization 1: Swatinem/rust-cache — per-target shared key for release cache isolation
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        if: steps.check_binary.outputs.binary_exists == 'true'
        with:
          cache-on-failure: true
          shared-key: release-${{ matrix.target }}
      - name: Build release binary
        if: steps.check_binary.outputs.binary_exists == 'true'
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Strip binary (Unix)
        if: steps.check_binary.outputs.binary_exists == 'true' && runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/prism 2>/dev/null || true
      - name: Create archive
        if: steps.check_binary.outputs.binary_exists == 'true'
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="prism-${TAG}-${{ matrix.target }}.${{ matrix.archive_ext }}"
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            cd target/${{ matrix.target }}/release
            7z a "../../../${ARCHIVE}" prism.exe
          else
            tar czf "${ARCHIVE}" -C target/${{ matrix.target }}/release prism
          fi
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV
      - name: Compute SHA-256 checksum
        if: steps.check_binary.outputs.binary_exists == 'true'
        shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ env.ARCHIVE }}" >> checksums.txt
          else
            shasum -a 256 "${{ env.ARCHIVE }}" >> checksums.txt
          fi
      - name: Attest build provenance
        if: steps.check_binary.outputs.binary_exists == 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ env.ARCHIVE }}
      - name: Upload artifacts
        if: steps.check_binary.outputs.binary_exists == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            checksums.txt

  publish-release:
    name: Create GitHub Release
    needs: build-release
    if: needs.build-release.outputs.binary_exists == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts/
      - name: Merge checksums
        shell: bash
        run: |
          cat artifacts/release-*/checksums.txt > checksums.txt
      - name: Create GitHub Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --title "Prism ${{ github.ref_name }}" --generate-notes artifacts/release-*/*.tar.gz artifacts/release-*/*.zip checksums.txt

  homebrew-update:
    name: Update Homebrew formula
    needs: build-release
    if: needs.build-release.outputs.binary_exists == 'true'
    runs-on: ubuntu-latest
    # TD-WV0-11: no job-level env — HOMEBREW_TAP_TOKEN scoped to step-level only
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: 1898co/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Download macOS aarch64 artifact for checksum
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-aarch64-apple-darwin
          path: artifacts/
      - name: Update Formula/prism.rb
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/prism-${TAG}-aarch64-apple-darwin.tar.gz"
          SHA256=$(grep "aarch64-apple-darwin" artifacts/checksums.txt | awk '{print $1}')
          sed -i "s|url \".*\"|url \"${URL}\"|" homebrew-tap/Formula/prism.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" homebrew-tap/Formula/prism.rb
      - name: Commit formula changes
        shell: bash
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "update-prism-${{ github.ref_name }}"
          git add Formula/prism.rb
          git commit -m "prism ${{ github.ref_name }}"
          git push origin "update-prism-${{ github.ref_name }}"
      - name: Create Homebrew tap PR
        shell: bash
        working-directory: homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: gh pr create --repo 1898co/homebrew-tap --title "Update prism to ${{ github.ref_name }}" --body "Automated formula update for Prism ${{ github.ref_name }}" --base main

  chocolatey-publish:
    name: Chocolatey publish
    needs: build-release
    if: needs.build-release.outputs.binary_exists == 'true'
    runs-on: windows-latest
    # TD-WV0-11: no job-level env — CHOCOLATEY_API_KEY scoped to step-level only
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download Windows artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-x86_64-pc-windows-msvc
          path: artifacts/
      - name: Pack and push Chocolatey package
        shell: pwsh
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          choco pack packaging/chocolatey/prism.nuspec
          choco push --source https://push.chocolatey.org/ --api-key $env:CHOCOLATEY_API_KEY

  crates-io-publish:
    name: Publish to crates.io
    needs: build-release
    if: needs.build-release.outputs.binary_exists == 'true'
    runs-on: ubuntu-latest
    # TD-WV0-11: no job-level env — CARGO_REGISTRY_TOKEN scoped to step-level only
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Publish prism-spec-engine (only crate without publish = false)
        # All other workspace crates carry `publish = false` in their Cargo.toml.
        # prism-{core,ocsf,security,mcp,storage,credentials,dtu-*} are all publish = false.
        # prism-{query,operations,bin} do not exist yet — add cargo publish lines here
        # when those crates are created and ready for crates.io.
        # TODO(future): add prism-core, prism-ocsf, prism-security once publish = false is removed
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish -p prism-spec-engine --no-verify
