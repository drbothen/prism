# Release workflow — triggered by v* tags; 5-platform builds, GitHub Release, Homebrew tap, crates.io
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build release (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/prism 2>/dev/null || true
      - name: Create archive
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="prism-${TAG}-${{ matrix.target }}.${{ matrix.archive_ext }}"
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            cd target/${{ matrix.target }}/release
            7z a "../../../${ARCHIVE}" prism.exe
          else
            tar czf "${ARCHIVE}" -C target/${{ matrix.target }}/release prism
          fi
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV
      - name: Compute SHA-256 checksum
        shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ env.ARCHIVE }}" >> checksums.txt
          else
            shasum -a 256 "${{ env.ARCHIVE }}" >> checksums.txt
          fi
      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            checksums.txt

  publish-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts/
      - name: Merge checksums
        shell: bash
        run: |
          cat artifacts/release-*/checksums.txt > checksums.txt
      - name: Create GitHub Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --title "Prism ${{ github.ref_name }}" --generate-notes artifacts/release-*/*.tar.gz artifacts/release-*/*.zip checksums.txt

  homebrew-update:
    name: Update Homebrew formula
    needs: build-release
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          repository: 1898co/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Download macOS aarch64 artifact for checksum
        uses: actions/download-artifact@v5
        with:
          name: release-aarch64-apple-darwin
          path: artifacts/
      - name: Update Formula/prism.rb
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/prism-${TAG}-aarch64-apple-darwin.tar.gz"
          SHA256=$(grep "aarch64-apple-darwin" artifacts/checksums.txt | awk '{print $1}')
          sed -i "s|url \".*\"|url \"${URL}\"|" homebrew-tap/Formula/prism.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" homebrew-tap/Formula/prism.rb
      - name: Commit formula changes
        shell: bash
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "update-prism-${{ github.ref_name }}"
          git add Formula/prism.rb
          git commit -m "prism ${{ github.ref_name }}"
          git push origin "update-prism-${{ github.ref_name }}"
      - name: Create Homebrew tap PR
        shell: bash
        working-directory: homebrew-tap
        run: gh pr create --repo 1898co/homebrew-tap --title "Update prism to ${{ github.ref_name }}" --body "Automated formula update for Prism ${{ github.ref_name }}" --base main

  chocolatey-publish:
    name: Chocolatey publish
    needs: build-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: release-x86_64-pc-windows-msvc
          path: artifacts/
      - name: Pack and push Chocolatey package
        shell: pwsh
        run: |
          choco pack packaging/chocolatey/prism.nuspec
          choco push --source https://push.chocolatey.org/ --api-key ${{ secrets.CHOCOLATEY_API_KEY }}

  crates-io-publish:
    name: Publish to crates.io
    needs: build-release
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish prism-core (first, dependency order)
        run: cargo publish -p prism-core --no-verify
      - name: Publish remaining crates
        run: |
          cargo publish -p prism-ocsf --no-verify
          cargo publish -p prism-query --no-verify
          cargo publish -p prism-spec-engine --no-verify
          cargo publish -p prism-operations --no-verify
          cargo publish -p prism-security --no-verify
          cargo publish -p prism --no-verify
