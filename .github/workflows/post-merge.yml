# Post-Merge Verification — Kani proofs + fuzz corpus (runs on push to main and develop)
name: Post-Merge Verification

on:
  push:
    branches:
      - main
      - develop
    # Optimization 6: path filtering — skip Kani+fuzz on doc-only / artifact-only changes.
    paths-ignore:
      - '.factory/**'
      - 'docs/**'
      - 'specs/**'
      - '**.md'
      - '.gitignore'
      - 'README*'
      - 'CHANGELOG*'

# Optimization 4: concurrency control — always let post-merge complete (do NOT cancel).
# These jobs gate formal verification; a superseded run here is still informative.
concurrency:
  group: post-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  kani-proofs:
    name: Kani formal verification
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          toolchain: nightly
      # Optimization 1: Swatinem/rust-cache (conditional — only when Kani files present)
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        if: hashFiles('**/*kani*.toml', 'crates/**/src/**/*kani*') != ''
        with:
          cache-on-failure: true
          shared-key: kani
      # Optimization 3: taiki-e/install-action for prebuilt kani-verifier
      - uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2.75.22
        if: hashFiles('**/*kani*.toml', 'crates/**/src/**/*kani*') != ''
        with:
          tool: kani-verifier
      - name: Run Kani proofs
        if: hashFiles('**/*kani*.toml', 'crates/**/src/**/*kani*') != ''
        # Scoped to the 4 crates that currently have #[kani::proof] attributes:
        # prism-core, prism-spec-engine, prism-security, prism-storage.
        # cargo kani --workspace fails because DTU crates require --features=dtu
        # to compile and have no Kani proofs. TD-KANI-001 tracks expanding this
        # list as more crates add proofs.
        run: cargo kani -p prism-core -p prism-spec-engine -p prism-security -p prism-storage
      - name: Upload Kani report
        if: hashFiles('**/*kani*.toml', 'crates/**/src/**/*kani*') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kani-report-${{ github.sha }}
          path: kani-report/
          if-no-files-found: ignore

  fuzz-corpus:
    name: Fuzz corpus generation
    runs-on: ubuntu-latest
    # 3 targets × 30 min max_total_time = 90 min ceiling + 30 min slack.
    # TD-FUZZ-001/002/003 track the 3 aspirational targets removed below.
    timeout-minutes: 120
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          toolchain: nightly
      # Optimization 1: Swatinem/rust-cache (conditional — only when fuzz present)
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        if: hashFiles('fuzz/Cargo.toml') != ''
        with:
          cache-on-failure: true
          shared-key: fuzz-${{ runner.os }}
      # Optimization 3: taiki-e/install-action for prebuilt cargo-fuzz
      - uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2.75.22
        if: hashFiles('fuzz/Cargo.toml') != ''
        with:
          tool: cargo-fuzz
      # Only the 3 fuzz harnesses that actually exist in fuzz/Cargo.toml.
      # Removed (harnesses never built; tracked as TDs for future implementation):
      #   fuzz_prismql_parser      → TD-FUZZ-001 (re-add when PrismQL parser ships)
      #   fuzz_alias_expansion     → TD-FUZZ-002 (re-add when alias expansion ships)
      #   fuzz_template_interpolation → TD-FUZZ-003 (re-add when template interpolation ships)
      - name: Fuzz OCSF normalize
        if: hashFiles('fuzz/Cargo.toml') != ''
        run: cargo fuzz run normalize_fuzz -- -max_total_time=1800
      - name: Fuzz spec parser
        if: hashFiles('fuzz/Cargo.toml') != ''
        run: cargo fuzz run spec_parser -- -max_total_time=1800
      - name: Fuzz injection scanner
        if: hashFiles('fuzz/Cargo.toml') != ''
        run: cargo fuzz run fuzz_injection_scanner -- -max_total_time=1800
      - name: Upload fuzz corpus artifacts
        if: hashFiles('fuzz/Cargo.toml') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-corpus-${{ github.sha }}
          path: fuzz/corpus/
          if-no-files-found: ignore
