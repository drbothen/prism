# Post-Merge Verification — Kani proofs + fuzz corpus (runs on push to main and develop)
name: Post-Merge Verification

on:
  push:
    branches:
      - main
      - develop

jobs:
  kani-proofs:
    name: Kani formal verification
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          toolchain: nightly
      - name: Install kani-verifier
        if: hashFiles('**/*kani*.toml', 'crates/**/src/**/*kani*') != ''
        run: cargo install kani-verifier --locked
      - name: Run Kani proofs
        if: hashFiles('**/*kani*.toml', 'crates/**/src/**/*kani*') != ''
        run: cargo kani --workspace
      - name: Upload Kani report
        if: hashFiles('**/*kani*.toml', 'crates/**/src/**/*kani*') != ''
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: kani-report-${{ github.sha }}
          path: kani-report/
          if-no-files-found: ignore

  fuzz-corpus:
    name: Fuzz corpus generation
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          toolchain: nightly
      - name: Install cargo-fuzz
        if: hashFiles('fuzz/Cargo.toml') != ''
        run: cargo install cargo-fuzz --locked
      - name: Fuzz prismql parser
        if: hashFiles('fuzz/Cargo.toml') != ''
        run: cargo fuzz run fuzz_prismql_parser -- -max_total_time=1800
      - name: Fuzz alias expansion
        if: hashFiles('fuzz/Cargo.toml') != ''
        run: cargo fuzz run fuzz_alias_expansion -- -max_total_time=1800
      - name: Fuzz OCSF normalize
        if: hashFiles('fuzz/Cargo.toml') != ''
        run: cargo fuzz run fuzz_normalize -- -max_total_time=1800
      - name: Fuzz spec parser
        if: hashFiles('fuzz/Cargo.toml') != ''
        run: cargo fuzz run fuzz_spec_parser -- -max_total_time=1800
      - name: Fuzz template interpolation
        if: hashFiles('fuzz/Cargo.toml') != ''
        run: cargo fuzz run fuzz_template_interpolation -- -max_total_time=1800
      - name: Fuzz injection scanner
        if: hashFiles('fuzz/Cargo.toml') != ''
        run: cargo fuzz run fuzz_injection_scanner -- -max_total_time=1800
      - name: Upload fuzz corpus artifacts
        if: hashFiles('fuzz/Cargo.toml') != ''
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-corpus-${{ github.sha }}
          path: fuzz/corpus/
          if-no-files-found: ignore
