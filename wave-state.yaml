# Prism wave-state — tracks wave lifecycle for the future
# validate-wave-gate-prerequisite.sh hook (to be added in vsdd-factory v0.52)
#
# Schema:
#   current_wave: <id>             # where NEW dispatches target
#   next_gate_required: <id|null>  # set when a wave is merged but gate not run
#   waves:
#     <wave_id>:
#       stories: [ids...]          # planned scope
#       stories_merged: [ids...]   # confirmed merged to develop
#       gate_status: not_started | in_progress | pending | passed | deferred
#       gate_date: YYYY-MM-DD      # when gate completed
#       gate_report: path          # wave-gate-<id>.md path
#       deferral_rationale: str    # only when gate_status: deferred

