# Prism wave-state — tracks wave lifecycle for the future
# validate-wave-gate-prerequisite.sh hook (to be added in vsdd-factory v0.52)
#
# Schema:
#   current_wave: <id>             # where NEW dispatches target
#   next_gate_required: <id|null>  # set when a wave is merged but gate not run
#   waves:
#     <wave_id>:
#       stories: [ids...]          # planned scope (per STORY-INDEX.md §Wave Summary)
#       stories_merged: [ids...]   # confirmed merged to develop
#       gate_status: not_started | in_progress | pending | passed | deferred
#       gate_date: YYYY-MM-DD      # when gate completed
#       gate_report: path          # wave-gate-<id>.md path
#       deferral_rationale: str    # only when gate_status: deferred
#
# Wave scope source of truth: .factory/stories/STORY-INDEX.md §Wave Summary
# Wave 0:  5 stories — S-0.01, S-0.02, S-6.06, S-6.14, S-6.15
# Wave 1: 19 stories — S-1.01..S-1.15 + S-6.07..S-6.10
# Wave 2: 11 stories — S-2.01..S-2.08 + S-6.11..S-6.13
# Wave 3: 17 stories — S-3.01..S-3.13 + S-6.16..S-6.19
# Wave 4:  8 stories — S-4.01..S-4.08
# Wave 5: 10 stories — S-5.01..S-5.10
# Wave 6:  5 stories — S-6.01..S-6.05
# Total:  75 stories (continuous story numbering; no resets between waves)

current_wave: wave_1
