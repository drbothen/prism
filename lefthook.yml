pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --all --check
    clippy:
      glob: "*.rs"
      run: cargo clippy --all-features -- -D warnings
    # layout: runs the full workspace scan once per commit when any crates/** file is staged.
    # Runtime must be under 1 second for the 22-crate workspace (ADR-012 §2.5, BC-3.7.001 precondition 4).
    # TODO(S-3.5.01 implementer): stub exits 1 — remove this TODO once check-crate-layout.sh is implemented.
    layout:
      glob: "crates/**"
      run: scripts/check-crate-layout.sh

pre-push:
  commands:
    check:
      run: just check

# pre-tag hook: runs semver-checks, audit, and deny before every `git tag` invocation.
# Requires lefthook >= 1.6. Verify with: lefthook --version
# If your lefthook version is < 1.6 (pre-tag not supported), run manually before tagging:
#   just semver-checks && just audit && just deny
pre-tag:
  commands:
    semver-checks:
      run: just semver-checks
    audit:
      run: just audit
    deny:
      run: just deny
