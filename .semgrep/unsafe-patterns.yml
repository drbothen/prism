rules:
  - id: prism-unsafe-block-requires-comment
    message: |
      Every `unsafe {}` block must have a preceding comment explaining why
      it is safe. Bare unsafe blocks are a maintenance hazard.
    languages: [rust]
    severity: WARNING
    patterns:
      - pattern: unsafe { ... }
      - pattern-not: |
          // $COMMENT
          unsafe { ... }
      - pattern-not: |
          /* $COMMENT */
          unsafe { ... }

  - id: prism-no-mem-transmute
    message: |
      `std::mem::transmute` is forbidden in Prism. Use safer alternatives
      (as casts with bounds checks, TryFrom, bytemuck for byte reinterpretation).
    languages: [rust]
    severity: ERROR
    pattern-either:
      - pattern: std::mem::transmute(...)
      - pattern: mem::transmute(...)
      - pattern: transmute(...)
