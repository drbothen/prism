rules:
  - id: prism-no-string-credentials
    message: >
      Credentials must not be stored in String types. Use SecretString or
      reference-based patterns per project AI-Opaque Credentials policy.
    languages: [rust]
    severity: ERROR
    patterns:
      - pattern: "let $X: String = ..."
      - metavariable-regex:
          metavariable: "$X"
          regex: "(?i)(password|secret|token|api_?key|credential|private_?key)"

  - id: prism-no-log-secret
    message: |
      Potential credential exposure in log output. Use tracing::info!
      with fields and mark secret fields as Sensitive.
    languages: [rust]
    severity: WARNING
    patterns:
      - pattern-either:
          - pattern: println!($FMT, ...)
          - pattern: eprintln!($FMT, ...)
          - pattern: tracing::trace!($FMT, ...)
          - pattern: tracing::debug!($FMT, ...)
          - pattern: tracing::info!($FMT, ...)
          - pattern: tracing::warn!($FMT, ...)
          - pattern: tracing::error!($FMT, ...)
          - pattern: log::trace!($FMT, ...)
          - pattern: log::debug!($FMT, ...)
          - pattern: log::info!($FMT, ...)
          - pattern: log::warn!($FMT, ...)
          - pattern: log::error!($FMT, ...)
      - metavariable-regex:
          metavariable: $FMT
          regex: '.*(?i)(password|secret|token|api_?key|credential|private_?key).*'
