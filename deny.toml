# deny.toml — cargo-deny configuration for the Prism workspace.
# Enforces license allowlist, advisory policy, ban rules, and source restrictions.

[licenses]
# OSI-approved licenses permitted in this workspace.
allow = [
  "MIT",
  "Apache-2.0",
  # Apache-2.0 WITH LLVM-exception: used by wasmtime, cranelift, and other LLVM-derived
  # crates. The LLVM exception grants additional permissions beyond Apache-2.0 (no patent
  # retaliation clause applies to LLVM-licensed code). Approved for S-1.15 (AD-019/SS-17).
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  # NCSA (University of Illinois/NCSA Open Source License): OSI-approved, FSF-Free.
  # Used by libfuzzer-sys 0.4.12 (VP-021 fuzz target) as "(MIT OR Apache-2.0) AND NCSA".
  "NCSA",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "CDLA-Permissive-2.0",
  # CC0-1.0: public domain dedication — used by `notify` (filesystem watcher).
  "CC0-1.0",
  # bzip2-1.0.6: BSD-like permissive license (4-clause, OSI-approved equivalent).
  # Introduced by libbz2-rs-sys v0.2.3 → bzip2 v0.6.1 → async-compression →
  # datafusion-datasource v53.1.0 (datafusion upgrade in S-3.02 / arrow v58.2.0).
  # Permissive: redistribution permitted with attribution, no patent retaliation.
  # Approved for S-3.02 (CI-FIX-001).
  "bzip2-1.0.6",
]

[advisories]
# Policy: vulnerability = "deny" (cargo-deny 0.19+ enforces this via RUSTSEC advisory DB;
# the legacy key was removed in 0.19 — see https://github.com/EmbarkStudios/cargo-deny/pull/611)
# All RUSTSEC advisories are checked; use ignore = [] to acknowledge specific ones.
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "none"
yanked = "deny"
ignore = []

[bans]
multiple-versions = "warn"
# deny wildcard version specs (e.g. "*") in registry deps; path deps are exempt
# because workspace-local crates use path = "../crate" without a version field.
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
