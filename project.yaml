# project.yaml — Dark Factory Project Manifest
# Prism: Rust-based MCP server for MSSP client sensor management.
# For single-repo projects, this file describes the target project.
# Reference repos are tracked separately in reference-manifest.yaml.

project:
  name: "prism"
  description: "Prism — Rust MCP server for multi-client security sensor management with OCSF+protobuf normalization"
  version: "0.1.0"

# Repositories in this project
# Prism is a single-repo project — one Rust crate/workspace
repos:
  prism:
    path: "."
    language: "rust"
    framework: "rmcp"
    role: "primary"
    contracts:
      produces:
        - type: "mcp"
          path: "./src/tools/"
          consumers: []
        - type: "protobuf"
          path: "./proto/"
          consumers: []
      consumes: []

# No cross-repo dependencies — single repo project
dependency_graph:
  - repo: "prism"
    depends_on: []

# Integration testing
integration:
  compose_file: "./docker-compose.integration.yml"
  test_command: "cargo test --workspace"
  test_dir: "./tests"

# Factory configuration
factory:
  project_factory_dir: "./.factory"
  per_repo_factory_dirs: false
  shared_holdout_scenarios: false
