[package]
name = "prism-security"
version = "0.1.0"
edition = "2021"
description = "Prism security subsystem — prompt injection defense, trust levels, output schemas (SS-09)"
license = "MIT"
publish = false

[lib]
name = "prism_security"

[features]
default = ["read-all"]
read-all = []

[dependencies]
prism-core = { path = "../prism-core", version = "0.1.0" }
regex = "1"
once_cell = "1"
unicode-normalization = "0.1"
base64 = "0.22"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"

[dev-dependencies]
proptest = "1"
serde_json = "1"

[lints.clippy]
# From workspace
await_holding_lock = "deny"
# Test files use .unwrap() by design — test-writer generated them;
# cannot be modified per story constraints. Allow so -D warnings passes test binaries.
unwrap_used = "allow"

[lints.rust]
# From workspace
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)'] }
# Test files use BC-style naming (test_BC_2_09_NNN_...) — generated by test-writer,
# cannot be modified per story constraints.
non_snake_case = "allow"
# Test files import items used only in certain cfg combinations.
unused_imports = "allow"
# proptest! macro expansion triggers unused doc comment warnings in test files.
unused_doc_comments = "allow"
