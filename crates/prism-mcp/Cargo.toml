[package]
name = "prism-mcp"
version = "0.1.0"
edition = "2021"
description = "Prism MCP transport layer — safety envelope middleware, tool registry (SS-10)"
license = "MIT"
publish = false

[lib]
name = "prism_mcp"

[dependencies]
prism-core = { path = "../prism-core", version = "0.2.0" }
prism-security = { path = "../prism-security", version = "0.1.0" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"

[dev-dependencies]
serde_json = "1"
prism-security = { path = "../prism-security", version = "0.1.0" }

[lints.clippy]
# From workspace
await_holding_lock = "deny"
# Test files use .unwrap() by design — test-writer generated them;
# cannot be modified per story constraints. Allow so -D warnings passes test binaries.
unwrap_used = "allow"

[lints.rust]
# From workspace
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)'] }
# Test files use BC-style naming (test_BC_2_09_NNN_...) — generated by test-writer,
# cannot be modified per story constraints.
non_snake_case = "allow"
# Test files import items used only in certain cfg combinations.
unused_imports = "allow"
