[package]
name = "prism-spec-engine"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Prism config-driven sensor adapter engine: TOML spec loading, pipeline execution, OCSF mapping, and infusion enrichment framework"

# ARCHITECTURE COMPLIANCE: prism-spec-engine MUST NOT depend on datafusion or arrow.
# Any addition of those deps MUST fail CI lint (cargo deny or equivalent).
# See architecture/module-decomposition.md SS-16; AD-015.

[dependencies]
prism-core = { path = "../prism-core", version = "0.1.0" }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
percent-encoding = "2"
thiserror = "1"
serde_json = "1"
regex = "1"
arc-swap = "1"
sha2 = "0.10"
lru = "0.12"
tokio = { version = "1", features = ["sync", "time", "rt"] }
tracing = "0.1"

[dev-dependencies]
proptest = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

[features]
default = []

[lints.rust]
# Allow #[cfg(kani)] without a registered cfg — kani is not a Cargo feature
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)'] }
# Test functions use BC-ID naming convention; cannot modify.
non_snake_case = "allow"

[lints.clippy]
# From workspace lints
await_holding_lock = "deny"
# Test files use .unwrap()/.unwrap_err() by design — test-writer generated them.
unwrap_used = "allow"

[[test]]
name = "infusion_tests"
path = "tests/infusion_tests.rs"
